<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <title>Stepover</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Test your football knowledge with Stepover — solo ranked, blitz, daily challenges, and multiplayer trivia modes. Climb the ELO leaderboard!">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#F7F8FA" media="(prefers-color-scheme: light)">
  <!-- Open Graph -->
  <meta property="og:title" content="Stepover — Football Trivia">
  <meta property="og:description" content="Solo ranked, blitz mode, daily challenges, and multiplayer. How well do you know football?">
  <meta property="og:image" content="https://football-quizball.vercel.app/icons/quizball-unlimited-logo.png">
  <meta property="og:url" content="https://football-quizball.vercel.app">
  <meta property="og:type" content="website">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Stepover — Football Trivia">
  <meta name="twitter:description" content="Solo ranked, blitz mode, daily challenges. Climb the ELO leaderboard!">
  <meta name="twitter:image" content="https://football-quizball.vercel.app/icons/quizball-unlimited-logo.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/quizball-unlimited-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;600&amp;family=Lexend:wght@400;500;600&amp;family=Space+Grotesk:wght@400;600;700&amp;display=swap" rel="stylesheet">
  <script>
    // Apply stored theme before first paint to avoid flash
    (function() {
      try {
        var t = localStorage.getItem('quizball_theme');
        if (t === 'light') document.documentElement.classList.remove('dark');
        else document.documentElement.classList.add('dark');
      } catch(e) {}
    })();
  </script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=groups_3,swords" rel="stylesheet">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <app-root></app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
</html>
