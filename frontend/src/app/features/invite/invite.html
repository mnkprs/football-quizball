<div class="invite-page page-stagger">
  <div class="invite-content">
    <div class="invite-hero">
      <div class="invite-emoji">🤝</div>
      <h1 class="invite-title">{{ lang.t().inviteTitle }}</h1>
      <p class="invite-subtitle">
        {{ lang.t().inviteSubtitle }}
      </p>
    </div>

    <div class="invite-actions">
      <button
        mat-flat-button
        color="primary"
        class="invite-btn invite-btn-primary"
        (click)="copyLink()"
      >
        <span class="material-icons">content_copy</span>
        {{ copied() ? lang.t().inviteCopied : lang.t().inviteCopy }}
      </button>

      @if (canShare()) {
        <button
          mat-stroked-button
          class="invite-btn"
          (click)="share()"
        >
          <span class="material-icons">share</span>
          {{ lang.t().inviteShare }}
        </button>
      }
    </div>
