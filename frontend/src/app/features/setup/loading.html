<div class="loading-page min-h-screen flex items-center justify-center">
  <div class="fixed top-4 right-4 z-10">
    <app-theme-toggle />
  </div>

  <div class="text-center px-6" role="status" aria-live="polite">
    <!-- Branded loader: same pulsing accent-bg tile used on app-question -->
    <div class="loading-tile mx-auto mb-6">
      <img
        ngSrc="/stepover-logo-white-bg.png"
        alt=""
        class="w-12 h-12 object-contain"
        width="48" height="48"
      />
    </div>

    <h1 class="loading-heading text-foreground mb-2">{{ lang.t().generatingQuestions }}</h1>
    <p class="text-muted-foreground text-base max-w-xs mx-auto">{{ lang.t().generatingSubtitle }}</p>

    <!-- Three-dot progress -->
    <div class="mt-8 flex justify-center gap-2" aria-hidden="true">
      <span class="loading-dot" style="animation-delay: 0ms"></span>
      <span class="loading-dot" style="animation-delay: 150ms"></span>
      <span class="loading-dot" style="animation-delay: 300ms"></span>
    </div>
  </div>
</div>
