<div class="setup-page flex flex-1 items-center justify-center p-4">
  <!-- Theme toggle fixed top-right -->
  <div class="fixed top-4 right-4 z-10">
    <app-theme-toggle />
  </div>

  <div class="w-full max-w-md">
    <!-- Visually-hidden heading for screen-reader orientation -->
    <h1 class="sr-only">{{ lang.t().setupHeading }}</h1>

    <!-- Player Name Inputs -->
    <div class="setup-card rounded-xl p-6">
      <div class="space-y-5 mb-6">
        <!-- Player 1 Input -->
        <div>
          <label for="setup-player1" class="flex items-center gap-2 text-sm font-semibold text-foreground mb-2">
            <span class="setup-player-dot setup-player-dot--p1"></span>
            Player 1
          </label>
          <input
            id="setup-player1"
            type="text"
            [(ngModel)]="player1Name"
            [placeholder]="lang.t().player1Placeholder"
            maxlength="20"
            class="w-full px-4 py-3.5 rounded-xl text-foreground placeholder:text-muted-foreground/60 focus-visible:outline-none transition font-medium"
          />
        </div>

        <!-- Player 2 Input -->
        <div>
          <label for="setup-player2" class="flex items-center gap-2 text-sm font-semibold text-foreground mb-2">
            <span class="setup-player-dot setup-player-dot--p2"></span>
            Player 2
          </label>
          <input
            id="setup-player2"
            type="text"
            [(ngModel)]="player2Name"
            [placeholder]="lang.t().player2Placeholder"
            maxlength="20"
            class="w-full px-4 py-3.5 rounded-xl text-foreground placeholder:text-muted-foreground/60 focus-visible:outline-none transition font-medium"
          />
        </div>
      </div>

      @if (store.error()) {
        <div role="alert" class="mb-4 p-3 bg-loss/10 rounded-xl text-loss text-sm text-center font-medium">
          {{ store.error() }}
        </div>
      }

      <button
        (click)="startGame()"
        [disabled]="!canStart()"
        class="setup-kickoff-btn w-full py-4 rounded-xl font-semibold text-base uppercase tracking-wider focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent transition-all duration-200 pressable
               disabled:opacity-40 disabled:cursor-not-allowed"
      >
        {{ lang.t().kickOff }}
      </button>
    </div>

    <!-- How to play -->
    <div class="mt-5 text-center text-muted-foreground/70 text-xs font-medium">
      {{ lang.t().howToPlay }}
    </div>
  </div>
</div>
