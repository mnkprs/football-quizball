<div class="home-page" #homePage>
  <div class="home-content">
@if (auth.isLoggedIn()) {
      <app-auth-card
        [avatarUrl]="avatarUrl()"
        [avatarLoadFailed]="avatarLoadFailed()"
        [displayName]="displayName()"
        [initials]="initials()"
        [statsText]="authStatsText()"
        [statsLoading]="profileLoading()"
        [signOutLabel]="lang.t().signOut"
        (signOut)="signOut()"
        (avatarError)="onAvatarError()"
      />
    }

    <app-daily-hero
      [title]="lang.t().btnDaily"
      [badgeLabel]="lang.t().dailyChallenge"
      [questionCount]="dailyCount() ?? '—'"
      [resetsIn]="dailyResetsIn()"
      [questionsLabel]="lang.t().dailyQuestionsLabel"
      [resetsLabel]="lang.t().dailyResetsIn"
      [playLabel]="lang.t().dailyPlay"
      backgroundImage="/football-field.png"
      (play)="goDaily()"
    />

    <app-daily-hero
      [title]="lang.t().btnNews"
      [badgeLabel]="lang.t().newsDailyBadge"
      [questionCount]="newsCount() ?? '—'"
      [resetsIn]="newsUpdatesIn()"
      questionsLabel="articles"
      resetsLabel="Updates in"
      playLabel="Read"
      backgroundImage="/news-mode.png"
      variant="sky"
      (play)="goNews()"
    />

    <app-section-header
      [title]="lang.t().gameModes"
      [actionLabel]="lang.t().viewAll"
      actionHref="/leaderboard"
    />

    <div class="home-modes">
      <app-mode-card
        icon="group"
        [sectionLabel]="lang.t().localMultiplayer"
        backgroundIcon="group"
        [title]="hasActive2PlayerGame() ? lang.t().btn2PlayerResume : lang.t().btn2Player"
        [hint]="lang.t().btn2PlayerHint"
        variant="primary"
        [actionLabel]="lang.t().startMatch"
        (cardClick)="toggle2PlayerExpanded()"
      />
      @if (twoPlayerExpanded()) {
        <div class="flex gap-3 -mt-2 px-1">
          <button
            (click)="go2Player()"
            class="flex-1 py-3 rounded-2xl bg-card border-2 border-border text-foreground font-bold text-sm hover:border-accent hover:text-accent active:scale-95 transition"
          >
            🏠 Local
          </button>
          <button
            (click)="goOnline()"
            class="flex-1 py-3 rounded-2xl bg-card border-2 border-border text-foreground font-bold text-sm hover:border-accent hover:text-accent active:scale-95 transition"
          >
            🌐 Online
          </button>
        </div>
      }
      <app-mode-card
        icon="local_fire_department"
        iconBgColor="orange"
        [title]="lang.t().btnMayhem"
        [hint]="lang.t().btnMayhemHint"
        [badge]="lang.t().mayhemNewBadge"
        badgeColor="red"
        backgroundImage="/mayhem-mode.png"
        variant="accent"
        [locked]="false"
        (cardClick)="goMayhem()"
      />
      <app-mode-card
        icon="swords"
        iconClass="material-symbols-outlined"
        iconBgColor="red"
        title="Duel"
        [hint]="auth.isLoggedIn() ? (pro.isPro() ? '1v1 High-Stakes Face-off • Winner takes all' : pro.trialDuelRemaining() > 0 ? '1v1 High-Stakes Face-off • ' + pro.trialDuelRemaining() + ' free duel' + (pro.trialDuelRemaining() === 1 ? '' : 's') + ' left' : 'Subscribe to play ranked duels') : '1v1 High-Stakes Face-off • Login required'"
        badge="1V1"
        badgeColor="red"
        backgroundImage="/duel_mode.png"
        variant="accent"
        actionLabel="Challenge Now"
        [proLocked]="auth.isLoggedIn() ? !pro.isPro() : true"
        (cardClick)="goDuel()"
      />
      <app-mode-card
        icon="groups_3"
        iconClass="material-symbols-outlined"
        sectionLabel="8-Player High-Speed Clash"
        title="Battle Royale"
        [hint]="auth.isLoggedIn() ? (pro.isPro() ? 'Compete for speed and correctness in real-time.' : pro.trialBattleRoyaleRemaining() > 0 ? 'Compete for speed and correctness • ' + pro.trialBattleRoyaleRemaining() + ' free game left' : 'Subscribe to play Battle Royale') : 'Compete for speed and correctness • Login required'"
        badge="8 Players"
        badgeColor="lime"
        backgroundImage="/royale.png"
        variant="accent"
        actionLabel="Join Battle"
        [proLocked]="auth.isLoggedIn() ? !pro.isPro() : true"
        (cardClick)="goBattleRoyale()"
      />
      <app-mode-card
        icon="emoji_events"
        iconBgColor="gold"
        [title]="lang.t().btnSolo"
        [hint]="soloHint()"
        [badge]="lang.t().eloSystem"
        badgeColor="gold"
        [footerText]="lang.t().playersOnline"
        backgroundImage="/solo-mode.png"
        variant="accent"
        [locked]="!auth.isLoggedIn()"
        (cardClick)="goSolo()"
      />
      <app-mode-card
        icon="bolt"
        iconBgColor="blue"
        [title]="lang.t().btnBlitz"
        [hint]="blitzHint()"
        [badge]="lang.t().speedrun"
        badgeColor="blue"
        backgroundImage="/blitz-mode.png"
        variant="accent"
        [locked]="!auth.isLoggedIn()"
        (cardClick)="goBlitz()"
      />
    </div>
  </div>
</div>
