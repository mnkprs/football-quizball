<div class="home-page" #homePage>
  <div class="home-content">
@if (auth.isLoggedIn()) {
      <app-auth-card
        [avatarUrl]="avatarUrl()"
        [avatarLoadFailed]="avatarLoadFailed()"
        [displayName]="displayName()"
        [initials]="initials()"
        [statsText]="authStatsText()"
        [statsLoading]="profileLoading()"
        [signOutLabel]="lang.t().signOut"
        (signOut)="signOut()"
        (avatarError)="onAvatarError()"
      />
    }

    <app-daily-hero
      [title]="lang.t().btnDaily"
      [badgeLabel]="lang.t().dailyChallenge"
      [questionCount]="dailyCount() ?? '—'"
      [resetsIn]="dailyResetsIn()"
      [questionsLabel]="lang.t().dailyQuestionsLabel"
      [resetsLabel]="lang.t().dailyResetsIn"
      [playLabel]="lang.t().dailyPlay"
      backgroundImage="/football-field.png"
      (play)="goDaily()"
    />

    <app-daily-hero
      [title]="lang.t().btnNews"
      [badgeLabel]="lang.t().newsDailyBadge"
      [questionCount]="newsCount() ?? '—'"
      [resetsIn]="newsUpdatesIn()"
      questionsLabel="articles"
      resetsLabel="Updates in"
      playLabel="Read"
      backgroundImage="/news-mode.png"
      variant="sky"
      (play)="goNews()"
    />

    <app-section-header
      [title]="lang.t().proArena"
    />

    <div class="section-modes pro-arena">
      <app-mode-card
        icon="swords"
        iconClass="material-symbols-outlined"
        iconBgColor="red"
        title="Duel"
        [hint]="auth.isLoggedIn() ? (pro.isPro() ? '1v1 High-Stakes Face-off • Unlimited' : pro.dailyDuelsRemaining() > 0 ? '1v1 High-Stakes Face-off • ' + pro.dailyDuelsRemaining() + ' free today' : '1v1 High-Stakes Face-off • Come back tomorrow') : '1v1 High-Stakes Face-off • Login required'"
        badge="1V1"
        badgeColor="red"
        backgroundImage="/duel_mode.png"
        variant="accent"
        actionLabel="Challenge Now"
        [locked]="!auth.isLoggedIn()"
        [rateLimit]="auth.isLoggedIn() && !pro.isPro() ? pro.dailyDuelsRemaining() : null"
        (cardClick)="goDuel()"
      />
      <app-mode-card
        icon="groups_3"
        iconClass="material-symbols-outlined"
        sectionLabel="8-Player High-Speed Clash"
        title="Battle Royale"
        [hint]="auth.isLoggedIn() ? (pro.isPro() ? 'Compete for speed and correctness in real-time.' : pro.trialBattleRoyaleRemaining() > 0 ? 'Compete for speed and correctness • 1 free game' : 'Upgrade to play Battle Royale') : 'Compete for speed and correctness • Login required'"
        badge="8 Players"
        badgeColor="lime"
        backgroundImage="/royale.png"
        variant="accent"
        actionLabel="Join Battle"
        [proLocked]="auth.isLoggedIn() ? (!pro.isPro() && pro.trialBattleRoyaleRemaining() === 0) : false"
        [locked]="!auth.isLoggedIn()"
        (cardClick)="goBattleRoyale()"
      />
    </div>

    <app-section-header
      [title]="lang.t().compete"
      [actionLabel]="lang.t().viewAll"
      actionHref="/leaderboard"
    />

    <div class="section-modes">
      <app-mode-card
        icon="image_search"
        iconBgColor="purple"
        title="Logo Quiz"
        hint="Guess the club from its logo"
        badge="COMING SOON"
        badgeColor="purple"
        backgroundImage="/logo-quiz.png"
        variant="accent"
        [locked]="true"
        (cardClick)="goLogoQuiz()"
      />
      <app-mode-card
        icon="emoji_events"
        iconBgColor="gold"
        [title]="lang.t().btnSolo"
        [hint]="soloHint()"
        [badge]="lang.t().eloSystem"
        badgeColor="gold"
        [footerText]="lang.t().playersOnline"
        backgroundImage="/solo-mode.png"
        variant="accent"
        [locked]="!auth.isLoggedIn()"
        (cardClick)="goSolo()"
      />
      <app-mode-card
        icon="bolt"
        iconBgColor="blue"
        [title]="lang.t().btnBlitz"
        [hint]="blitzHint()"
        [badge]="lang.t().speedrun"
        badgeColor="blue"
        backgroundImage="/blitz-mode.png"
        variant="accent"
        [locked]="!auth.isLoggedIn()"
        (cardClick)="goBlitz()"
      />
      <app-mode-card
        icon="local_fire_department"
        iconBgColor="orange"
        [title]="lang.t().btnMayhem"
        [hint]="lang.t().btnMayhemHint"
        [badge]="lang.t().mayhemNewBadge"
        badgeColor="red"
        backgroundImage="/mayhem-mode.png"
        variant="accent"
        [locked]="false"
        (cardClick)="goMayhem()"
      />
      <div class="two-player-card">
        <img class="two-player-card__bg-image" src="/football-field.png" alt="" aria-hidden="true" />
        <span class="two-player-card__bg-overlay" aria-hidden="true"></span>
        <span class="two-player-card__badge">{{ lang.t().localMultiplayer }}</span>
        <h3 class="two-player-card__title">{{ hasActive2PlayerGame() ? lang.t().btn2PlayerResume : lang.t().btn2Player }}</h3>
        <p class="two-player-card__hint">{{ lang.t().btn2PlayerHint }}</p>
        <div class="two-player-card__actions">
          <button class="two-player-card__btn" (click)="go2Player()">
            <span class="material-icons two-player-card__btn-icon">smartphone</span>
            <span class="two-player-card__btn-label">Local</span>
            <span class="two-player-card__btn-sub">Same device</span>
          </button>
          <button class="two-player-card__btn" (click)="goOnline()">
            <span class="material-icons two-player-card__btn-icon">public</span>
            <span class="two-player-card__btn-label">Online</span>
            <span class="two-player-card__btn-sub">Play ranked</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
