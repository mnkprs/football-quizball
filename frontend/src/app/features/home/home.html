<!--
  home.html — drop-in replacement for frontend/src/app/features/home/home.html
  ───────────────────────────────────────────────────────────────────────────
  Changes vs. previous home.html:
    • Logo Quiz hero NO LONGER followed by 3 sub-mode rows — the lobby now
      handles Solo/Duel/Royale sub-mode picking. Saves ~40 lines.
    • `.two-player-card` replaced by <so-multiplayer-card> (new DS component).
    • Section labels use <so-section-header> (new DS component) instead of
      ad-hoc .so-section-header div + class.
    • "Pro Arena" label kept — but section now reads as a single unified list.
    • Navigation handlers unchanged.
-->
<div class="home-page" #homePage>
  <div class="home-content page-stagger">

    <!-- ─── FEATURED ─────────────────────────────── -->
    <so-mode-card
      title="Logo Quiz"
      subtitle="Guess the club from its crest · Solo, Duel, or Royale"
      badge="FEATURED"
      image="/gemini-logo.png"
      [height]="220"
      accent="var(--color-purple)"
      (pressed)="goLogoQuiz()"
    />

    <!-- ─── MULTIPLAYER ──────────────────────────── -->
    <so-multiplayer-card
      [title]="hasActive2PlayerGame() ? lang.t().btn2PlayerResume : lang.t().btn2Player"
      [subtitle]="lang.t().btn2PlayerHint"
      [badge]="lang.t().localMultiplayer"
      badgeVariant="accent"
      image="/2-player-mode.png"
      accent="var(--color-accent)"
      [primary]="{ label: 'Local',  sub: 'Same device', icon: 'smartphone' }"
      [secondary]="{ label: 'Online', sub: 'Play ranked', icon: 'public' }"
      (primaryPressed)="go2Player()"
      (secondaryPressed)="goOnline()"
    />

    <!-- ─── PRO ARENA ────────────────────────────── -->
    <so-section-header [label]="lang.t().proArena" />

    <div class="section-modes pro-arena-tier">
      <so-mode-row
        title="Battle Royale"
        subtitle="Up to 20 players, elimination"
        image="/royale.png"
        materialIcon="military_tech"
        [iconBg]="'rgba(230,168,0,0.15)'"
        [iconColor]="'var(--color-pro)'"
        [badge]="battleRoyaleBadge()"
        accent="var(--color-pro)"
        (pressed)="goBattleRoyale()"
      />
      <so-mode-row
        title="Duel"
        [subtitle]="duelHint()"
        image="/duel-mode.png"
        materialIcon="swords"
        [iconBg]="'rgba(239,68,68,0.15)'"
        [iconColor]="'#ef4444'"
        [badge]="duelBadge()"
        (pressed)="goDuel()"
      />
      <so-mode-row
        [title]="lang.t().btnSolo"
        [subtitle]="soloHint()"
        image="/solo-mode.png"
        materialIcon="emoji_events"
        [iconBg]="'rgba(230,168,0,0.15)'"
        [iconColor]="'var(--color-pro)'"
        accent="var(--color-pro)"
        (pressed)="goSolo()"
      />
      <so-mode-row
        title="Blitz"
        subtitle="Coming soon"
        image="/blitz-mode.png"
        materialIcon="bolt"
        [iconBg]="'rgba(255,149,0,0.15)'"
        [iconColor]="'var(--color-warning)'"
        accent="var(--color-warning)"
        badge="SOON"
        (pressed)="goBlitz()"
      />
    </div>

  </div>
</div>
