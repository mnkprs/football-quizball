<div class="home-page" #homePage>
  <div class="home-content page-stagger">

    <!-- TIER 1 — Logo Quiz hero -->
    <so-mode-card
      title="Logo Quiz"
      subtitle="Guess the club from its logo"
      badge="FEATURED"
      image="/gemini-logo.png"
      [height]="220"
      (pressed)="goLogoQuiz()"
    />

    <!-- TIER 2 — 2-Player multiplayer card -->
    <div class="two-player-card">
      <img class="two-player-card__bg-image" ngSrc="/2-player-mode.png" alt="" aria-hidden="true" fill priority />
      <span class="two-player-card__bg-overlay" aria-hidden="true"></span>

      <so-chip variant="accent" size="xs" class="two-player-card__badge">
        {{ lang.t().localMultiplayer }}
      </so-chip>

      <h3 class="two-player-card__title">
        {{ hasActive2PlayerGame() ? lang.t().btn2PlayerResume : lang.t().btn2Player }}
      </h3>
      <p class="two-player-card__hint">{{ lang.t().btn2PlayerHint }}</p>

      <div class="two-player-card__actions">
        <button type="button" class="two-player-card__btn" (click)="go2Player()">
          <span class="material-icons two-player-card__btn-icon">smartphone</span>
          <span class="two-player-card__btn-label">Local</span>
          <span class="two-player-card__btn-sub">Same device</span>
        </button>
        <button type="button" class="two-player-card__btn" (click)="goOnline()">
          <span class="material-icons two-player-card__btn-icon">public</span>
          <span class="two-player-card__btn-label">Online</span>
          <span class="two-player-card__btn-sub">Play ranked</span>
        </button>
      </div>
    </div>

    <!-- TIER 3 — Pro Arena section -->
    <div class="so-section-header">{{ lang.t().proArena }}</div>

    <div class="section-modes pro-arena-tier">
      <so-mode-row
        title="Battle Royale"
        subtitle="20-player elimination"
        image="/royale.png"
        materialIcon="military_tech"
        [iconBg]="'rgba(230,168,0,0.15)'"
        [iconColor]="'var(--color-pro)'"
        [badge]="battleRoyaleBadge()"
        accent="var(--color-pro)"
        (pressed)="goBattleRoyale()"
      />

      <so-mode-row
        title="Duel"
        [subtitle]="duelHint()"
        image="/duel-mode.png"
        materialIcon="swords"
        [iconBg]="'rgba(239,68,68,0.15)'"
        [iconColor]="'#ef4444'"
        [badge]="duelBadge()"
        (pressed)="goDuel()"
      />

      <so-mode-row
        [title]="lang.t().btnSolo"
        [subtitle]="soloHint()"
        image="/solo-mode.png"
        materialIcon="emoji_events"
        [iconBg]="'rgba(230,168,0,0.15)'"
        [iconColor]="'var(--color-pro)'"
        accent="var(--color-pro)"
        (pressed)="goSolo()"
      />

      <so-mode-row
        title="Blitz"
        subtitle="Coming soon"
        image="/blitz-mode.png"
        materialIcon="bolt"
        [iconBg]="'rgba(255,149,0,0.15)'"
        [iconColor]="'var(--color-warning)'"
        accent="var(--color-warning)"
        badge="SOON"
        (pressed)="goBlitz()"
      />
    </div>

  </div>
</div>
