<div class="notifications-page" role="main" aria-label="Notifications">
  <div class="notifications-header">
    <div class="notifications-header__left">
      <button class="notifications-back-btn pressable" aria-label="Go back" (click)="goBack()">
        <span class="material-icons">arrow_back</span>
      </button>
      <h1 class="notifications-title">Notifications</h1>
    </div>
    <button class="notifications-mark-all pressable" (click)="markAllRead()" aria-label="Mark all notifications as read">Mark all read</button>
  </div>

  @if (loading()) {
    <div class="notifications-loading" role="status" aria-label="Loading notifications">
      <span class="material-icons notifications-spinner">sync</span>
    </div>
  } @else if (error()) {
    <div class="notifications-error" role="alert">
      <span class="notifications-error__icon material-icons">cloud_off</span>
      <p class="notifications-error__text">Couldn't load notifications</p>
      <button class="notifications-error__retry pressable" (click)="retry()">Try again</button>
    </div>
  } @else if (empty()) {
    <div class="notifications-empty" role="status">
      <span class="notifications-empty__icon">⚽</span>
      <p class="notifications-empty__text">You're all caught up!</p>
    </div>
  } @else {
    <div class="notifications-feed" role="list" aria-label="Notification list" aria-live="polite">
      @for (group of groups(); track group.label) {
        <div class="notifications-group" role="group" [attr.aria-label]="group.label">
          <div class="notifications-group__label" aria-hidden="true">{{ group.label }}</div>
          @for (n of group.notifications; track n.id) {
            <button
              class="notification-card pressable"
              role="listitem"
              [class.notification-card--unread]="!n.read"
              [attr.aria-label]="(n.read ? '' : 'Unread: ') + n.title + '. ' + n.body"
              (click)="onTapNotification(n)">
              <div class="notification-card__icon" aria-hidden="true">{{ n.icon }}</div>
              <div class="notification-card__content">
                <div class="notification-card__title">{{ n.title }}</div>
                <div class="notification-card__body">{{ n.body }}</div>
                <div class="notification-card__time">{{ relativeTime(n.createdAt) }}</div>
              </div>
              @if (!n.read) {
                <div class="notification-card__dot" aria-hidden="true"></div>
              }
            </button>
          }
        </div>
      }
    </div>
  }
</div>
