<div class="game-shell relative min-h-screen max-w-md mx-auto flex flex-col pt-safe pb-safe">
  @if (store.phase() !== 'loading' && store.phase() !== 'finished' && store.phase() !== 'question') {
    <button
      (click)="goBack()"
      class="game-back-btn absolute left-4 top-4 z-20 inline-flex items-center min-h-[44px] min-w-[44px] py-2 px-3 rounded-xl text-muted-foreground hover:text-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent transition text-sm font-medium"
    >
      {{ lang.t().backToHome }}
    </button>
  }
  @switch (store.phase()) {
    @case ('setup') { <app-setup /> }
    @case ('loading') { <app-loading /> }
    @case ('board') { <app-board /> }
    @case ('question') { <app-question /> }
    @case ('result') { <app-result /> }
    @case ('finished') { <app-results /> }
    @default { <app-setup /> }
  }
</div>
