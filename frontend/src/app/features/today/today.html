<div class="today-page page-stagger">
  <!-- Premium header -->
  <div class="today-header">
    <div class="today-header__date">{{ todayDate() }}</div>
    <h1 class="today-header__title">{{ lang.t().navCasual }}</h1>
    <p class="today-header__subtitle">Fresh questions every day — test your football knowledge</p>
    <div class="today-header__divider">
      <span class="today-header__divider-line"></span>
      <span class="material-icons today-header__divider-icon">sports_soccer</span>
      <span class="today-header__divider-line"></span>
    </div>
  </div>

  <div class="today-heroes">
    <app-daily-hero
      [title]="lang.t().btnDaily"
      [badgeLabel]="lang.t().dailyChallenge"
      [questionCount]="dailyCount() ?? '—'"
      [resetsIn]="dailyResetsIn()"
      [questionsLabel]="lang.t().dailyQuestionsLabel"
      [resetsLabel]="lang.t().dailyResetsIn"
      [playLabel]="lang.t().dailyPlay"
      backgroundImage="/football-field.png"
      (play)="goDaily()"
    />

    <app-daily-hero
      [title]="lang.t().btnNews"
      [badgeLabel]="lang.t().newsDailyBadge"
      [questionCount]="newsCount() ?? '—'"
      [resetsIn]="newsUpdatesIn()"
      questionsLabel="articles"
      resetsLabel="Updates in"
      playLabel="Play"
      backgroundImage="/news-mode.png"
      variant="sky"
      (play)="goNews()"
    />
  </div>
</div>
