<div class="app-container" [class.app-container--full]="isAdminRoute()">
  <router-outlet />
  @if (achievementUnlock.showModal()) {
    <app-achievement-unlock-modal />
  }
  @if (donateService.showModal()) {
    <app-donate-modal />
  }
  @if (authModal.isOpen()) {
    <app-auth-modal />
  }
  @if (usernameModal.isOpen()) {
    <app-username-modal />
  }
</div>
<app-toast />
<app-force-update-banner />
<app-level-up-overlay />

@if (showSplash()) {
  <div class="splash-overlay" [class.fading]="splashFading()">
    <img ngSrc="/stepover-logo-white-bg.png" alt="StepOver" class="splash-logo" width="80" height="80" priority />
    <p class="splash-title brand-text" data-text="STEPOVR.">STEPOVR.</p>
    <p class="splash-tagline">Football. Quiz. Glory.</p>
  </div>
}
