<section class="player-banner" [style.--tier-color]="tierColor()">

  <!-- Left: avatar with tier ring -->
  <div class="player-banner__avatar-wrap">
    @if (avatarUrl() && !avatarLoadFailed()) {
      <img
        [src]="avatarUrl()"
        [alt]="displayName() + ' avatar'"
        class="player-banner__avatar"
        referrerpolicy="no-referrer"
        (error)="avatarError.emit()"
      />
    } @else {
      <div class="player-banner__avatar player-banner__avatar-fallback" [attr.aria-label]="displayName() + ' initials'">
        {{ initials() }}
      </div>
    }
    <span class="player-banner__tier-dot" [title]="tierLabel()"></span>
  </div>

  <!-- Center: name + tier + stats -->
  <div class="player-banner__body">
    <div class="player-banner__top">
      <p class="player-banner__name">{{ displayName() }}</p>
      <span class="player-banner__tier-badge">{{ tierLabel() }}</span>
    </div>

    @if (statsLoading()) {
      <div class="player-banner__skeleton-row">
        <div class="player-banner__skeleton"></div>
        <div class="player-banner__skeleton player-banner__skeleton--sm"></div>
        <div class="player-banner__skeleton player-banner__skeleton--sm"></div>
      </div>
    } @else {
      <ul class="player-banner__chips" aria-label="Player stats">
        @for (stat of parsedStats(); track stat) {
          <li class="player-banner__chip">{{ stat }}</li>
        }
      </ul>
    }
  </div>

  <!-- Right: sign out -->
  <button
    type="button"
    class="player-banner__sign-out"
    (click)="signOut.emit()"
    [attr.aria-label]="signOutLabel()"
    title="Sign out"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
  </button>

</section>
