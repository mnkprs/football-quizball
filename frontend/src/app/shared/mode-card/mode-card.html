<app-mode-card-container
  [variant]="variant()"
  [compact]="compact()"
  [backgroundIcon]="backgroundIcon()"
  [backgroundImage]="backgroundImage()"
  [ariaLabel]="title()"
  (clicked)="!locked() && !proLocked() && cardClick.emit()"
>
  @if (locked()) {
    <div class="mode-card__locked-overlay">
      <span class="material-icons mode-card__lock-icon">lock</span>
      <span class="mode-card__lock-text">Available Soon</span>
    </div>
  }
  @if (proLocked()) {
    <div class="mode-card__locked-overlay mode-card__locked-overlay--pro" (click)="onProOverlayClick($event)">
      <div class="mode-card__pro-lock-badge">
        <span class="material-icons mode-card__pro-lock-crown">workspace_premium</span>
        <span class="mode-card__pro-lock-label">Pro</span>
      </div>
      <span class="mode-card__pro-lock-text">Upgrade to unlock</span>
    </div>
  }
  @if (badge(); as badgeText) {
    <span class="mode-card__badge-pill"
      [class.mode-card__badge-pill--accent]="badgeColor() === 'lime'"
      [class.mode-card__badge-pill--red]="badgeColor() === 'red'"
      [class.mode-card__badge-pill--blue]="badgeColor() === 'blue'"
      [class.mode-card__badge-pill--gold]="badgeColor() === 'gold'"
      [class.mode-card__badge-pill--purple]="badgeColor() === 'purple'"
    >{{ badgeText }}</span>
  }
  <h3 class="mode-card__title">{{ title() }}</h3>
  <p class="mode-card__hint">{{ hint() }}</p>
  @if (actionLabel()) {
    <span class="mode-card__cta">{{ actionLabel() }}</span>
  }
</app-mode-card-container>
