<button type="button"
        class="so-row so-overlay-horizontal"
        [class.so-row--disabled]="disabled()"
        [class.is-coming-soon]="disabled()"
        [style.background-image]="image() ? 'url(' + image() + ')' : null"
        [style.border-left-color]="accent()"
        [attr.aria-disabled]="disabled() ? 'true' : null"
        [disabled]="disabled()"
        (click)="onClick()">
  <div class="so-icon" [style.background]="iconBg() || 'rgba(0,122,255,0.15)'"
       [style.color]="iconColor() || 'var(--color-accent)'">
    @if (disabled()) {
      <span class="material-symbols-outlined" aria-hidden="true">lock</span>
    } @else if (materialIcon()) {
      <span class="material-symbols-outlined">{{ materialIcon() }}</span>
    }
    <ng-content select="[icon]" />
  </div>
  <div class="so-text">
    <div class="so-title">
      <span class="font-headline">{{ title() }}</span>
      @if (badge()) {
        <so-chip [variant]="disabled() ? 'default' : chipVariant()" size="xs">{{ badge() }}</so-chip>
      }
    </div>
    @if (subtitle()) { <div class="so-sub">{{ subtitle() }}</div> }
  </div>
  <div class="so-chev" aria-hidden="true">{{ disabled() ? '' : '›' }}</div>
</button>
