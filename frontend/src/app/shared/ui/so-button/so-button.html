<button
  type="button"
  class="so-btn inline-flex items-center justify-center gap-2 font-bold uppercase tracking-[0.08em] rounded-lg whitespace-nowrap select-none transition-[transform,box-shadow] duration-150 ease-out"
  [class.opacity-60]="disabled()"
  [class.cursor-not-allowed]="disabled()"
  [class.w-full]="fullWidth()"
  [ngClass]="[sizeClass(), variantClass()]"
  [ngStyle]="accentStyle()"
  [disabled]="disabled()"
  (click)="pressed.emit()">
  <ng-content select="[leading]" />
  <span class="so-btn__text">
    <span class="so-btn__label"><ng-content /></span>
    <ng-content select="[sub]" />
  </span>
  <ng-content select="[trailing]" />
</button>
