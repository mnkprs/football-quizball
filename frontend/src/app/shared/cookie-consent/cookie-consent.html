@if (consent.consentGiven() === null) {
  <div class="cookie-banner">
    <p class="cookie-banner__text">
      We use cookies for ads and analytics.
      <a routerLink="/privacy" class="cookie-banner__link">Privacy Policy</a>
    </p>
    <div class="cookie-banner__actions">
      <button type="button" class="cookie-banner__btn cookie-banner__btn--reject" (click)="consent.reject()">
        Necessary Only
      </button>
      <button type="button" class="cookie-banner__btn cookie-banner__btn--accept" (click)="consent.accept()">
        Accept All
      </button>
    </div>
  </div>
}
