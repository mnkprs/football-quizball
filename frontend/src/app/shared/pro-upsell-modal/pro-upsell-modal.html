@if (open) {
  <div class="overlay" (click)="dismiss.emit()" role="dialog" aria-modal="true">
    <div class="sheet" (click)="$event.stopPropagation()">
      <div class="icon" aria-hidden="true">🔒</div>
      <h2>{{ title }}</h2>
      <p>{{ body }}</p>
      <button type="button" class="primary" (click)="upgrade()">Upgrade</button>
      <button type="button" class="ghost" (click)="dismiss.emit()">Not now</button>
    </div>
  </div>
}
