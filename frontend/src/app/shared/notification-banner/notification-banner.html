@if (hasAny()) {
  <div class="banners">

    @if (news().visible) {
      <div class="banner banner--news glass-surface" role="status" aria-live="polite">
        <span class="banner__icon" aria-hidden="true">📰</span>
        <div class="banner__body">
          <p class="banner__title">New News questions available!</p>
          <!-- <p class="banner__sub">Fresh football news questions are ready to play.</p> -->
        </div>
        <div class="banner__actions">
          <button class="banner__cta" (click)="playNews()">Play Now</button>
          <button class="banner__dismiss" (click)="dismissNews()" aria-label="Dismiss news notification">
            <span class="material-icons">close</span>
          </button>
        </div>
      </div>
    }

    @if (daily().visible) {
      <div class="banner banner--daily glass-surface" role="status" aria-live="polite">
        <span class="banner__icon" aria-hidden="true">📅</span>
        <div class="banner__body">
          <p class="banner__title">New TiF questions available!</p>
          <!-- <p class="banner__sub">New daily questions have been added for today.</p> -->
        </div>
        <div class="banner__actions">
          <button class="banner__cta" (click)="playDaily()">Play Now</button>
          <button class="banner__dismiss" (click)="dismissDaily()" aria-label="Dismiss daily notification">
            <span class="material-icons">close</span>
          </button>
        </div>
      </div>
    }

  </div>
}
