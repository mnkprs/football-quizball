@if (enabled) {
  <div class="ad-container">
    <ins
      #adSlot
      class="adsbygoogle"
      [attr.data-ad-client]="adClient"
      [attr.data-ad-slot]="adSlotId"
      data-ad-format="auto"
      data-full-width-responsive="true"
      style="display: block; min-height: 100px;"
    ></ins>
  </div>
}
