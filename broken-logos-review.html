const MARKS_KEY = 'broken-logos-marks-v1';
let marks = JSON.parse(localStorage.getItem(MARKS_KEY) || '{}');

// Detect likely "competition-as-team" rows (team name = competition name or contains "Premier League", etc.)
const COMP_ROW_PATTERNS = [
  /premier league/i,
  /^a league/i,
  /^serie [a-z]/i,
  /bundesliga/i,
  /chance liga/i,
  /eerste divisie/i,
  /^3[ -]liga$/i,
];
function isLikelyCompetitionRow(e) {
  return COMP_ROW_PATTERNS.some(p => p.test(e.team_name)) && e.slug.includes(e.comp);
}

const grid = document.getElementById('grid');
const searchInput = document.getElementById('search');
const compFilter = document.getElementById('compFilter');
const markFilter = document.getElementById('markFilter');
const visibleCount = document.getElementById('visibleCount');

// Populate competition filter
const comps = [...new Set(DATA.map(d => d.comp))].sort();
for (const c of comps) {
  const o = document.createElement('option');
  o.value = c;
  o.textContent = c + ' (' + DATA.filter(d => d.comp === c).length + ')';
  compFilter.appendChild(o);
}

function getMark(key) { return marks[key] || null; }
function setMark(key, mark) {
  if (mark === null) delete marks[key];
  else marks[key] = mark;
  localStorage.setItem(MARKS_KEY, JSON.stringify(marks));
}

function render() {
  const q = searchInput.value.toLowerCase().trim();
  const comp = compFilter.value;
  const markF = markFilter.value;

  grid.innerHTML = '';
  let visible = 0;

  for (const e of DATA) {
    const key = e.comp + '/' + e.slug;
    const mark = getMark(key);

    // Filters
    if (q) {
      const hay = (e.team_name + ' ' + e.slug + ' ' + e.country + ' ' + e.comp).toLowerCase();
      if (!hay.includes(q)) continue;
    }
    if (comp && e.comp !== comp) continue;
    if (markF === 'unmarked' && mark) continue;
    if (markF && markF !== 'unmarked' && mark !== markF) continue;

    const card = document.createElement('div');
    card.className = 'card' + (mark ? ' marked-' + mark : '');

    const missingPills = [];
    if (e.missing.easy) missingPills.push('<span class="pill">easy</span>');
    if (e.missing.medium) missingPills.push('<span class="pill">medium</span>');
    if (e.missing.hard) missingPills.push('<span class="pill">hard</span>');

    const flagged = isLikelyCompetitionRow(e);

    card.innerHTML = '' +
      '<div class="logo-wrap">' +
        (e.real_image_url ? '<img src="' + escapeAttr(e.real_image_url) + '" alt="' + escapeAttr(e.team_name) + '" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement(\'span\'),{className:\'no-img\',textContent:\'Image failed to load\'}))">' : '<span class="no-img">No image</span>') +
      '</div>' +
      '<div class="info">' +
        '<div class="team-name ' + (flagged ? 'flag-competition' : '') + '">' + escapeHtml(e.team_name) + (flagged ? ' ⚠' : '') + '</div>' +
        '<div class="meta">' +
          '<span>' + escapeHtml(e.comp) + '</span> · <span>' + escapeHtml(e.country) + '</span>' +
        '</div>' +
        '<div class="slug">' + escapeHtml(e.slug) + '</div>' +
        '<div class="missing">' + missingPills.join('') + '</div>' +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn-regen ' + (mark === 'regen' ? 'active' : '') + '" data-key="' + escapeAttr(key) + '" data-action="regen">Regenerate</button>' +
        '<button class="btn-skip ' + (mark === 'skip' ? 'active' : '') + '" data-key="' + escapeAttr(key) + '" data-action="skip">Skip</button>' +
        '<button class="btn-delete ' + (mark === 'delete' ? 'active' : '') + '" data-key="' + escapeAttr(key) + '" data-action="delete">Delete</button>' +
      '</div>';
    grid.appendChild(card);
    visible++;
  }

  visibleCount.textContent = visible + ' visible';
}

grid.addEventListener('click', (ev) => {
  const btn = ev.target.closest('button[data-action]');
  if (!btn) return;
  const key = btn.dataset.key;
  const action = btn.dataset.action;
  if (getMark(key) === action) setMark(key, null);
  else setMark(key, action);
  render();
});

function toggleFlagComps() {
  // Auto-mark competition rows as "delete"
  let changed = 0;
  for (const e of DATA) {
    if (isLikelyCompetitionRow(e)) {
      const key = e.comp + '/' + e.slug;
      if (!getMark(key)) { setMark(key, 'delete'); changed++; }
    }
  }
  alert('Auto-marked ' + changed + ' likely competition-row entries as DELETE.');
  render();
}

function exportDecisions() {
  const out = { regenerate: [], delete: [], skip: [], unmarked: [] };
  for (const e of DATA) {
    const key = e.comp + '/' + e.slug;
    const m = getMark(key) || 'unmarked';
    out[m].push({ comp: e.comp, slug: e.slug, team_name: e.team_name, country: e.country });
  }
  document.getElementById('exportContent').textContent = JSON.stringify(out, null, 2);
  document.getElementById('exportArea').classList.add('show');
  document.getElementById('exportArea').scrollIntoView({ behavior: 'smooth' });
}

function copyExport() {
  navigator.clipboard.writeText(document.getElementById('exportContent').textContent);
}

function clearAll() {
  if (!confirm('Clear all marks?')) return;
  marks = {};
  localStorage.removeItem(MARKS_KEY);
  render();
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

searchInput.addEventListener('input', render);
compFilter.addEventListener('change', render);
markFilter.addEventListener('change', render);
render();
</script>
